<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文档审核助手</title>
    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2rem;
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        .card h2 {
            color: #333;
            margin-bottom: 16px;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .card h2 .badge {
            background: #667eea;
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }
        input[type="text"], input[type="password"], textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        input[type="text"]:focus, input[type="password"]:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        textarea {
            min-height: 200px;
            resize: vertical;
            font-family: inherit;
        }
        .file-upload {
            border: 2px dashed #ccc;
            border-radius: 8px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        .file-upload:hover {
            border-color: #667eea;
            background: #f8f9ff;
        }
        .file-upload input {
            display: none;
        }
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px 32px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .result {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 16px;
            margin-top: 16px;
            white-space: pre-wrap;
            line-height: 1.6;
            color: #333;
        }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .tab {
            flex: 1;
            padding: 12px;
            border: none;
            background: #e0e0e0;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s;
        }
        .tab.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .hidden { display: none; }
        .loading {
            text-align: center;
            padding: 20px;
            color: #666;
        }
        .loading::after {
            content: "...";
            animation: dots 1.5s steps(4, end) infinite;
        }
        @keyframes dots {
            0%, 20% { content: "."; }
            40% { content: ".."; }
            60%, 100% { content: "..."; }
        }
        .step-info {
            background: #e8f4fd;
            border-left: 4px solid #2196F3;
            padding: 12px 16px;
            margin-bottom: 16px;
            border-radius: 0 8px 8px 0;
            color: #1565C0;
        }
        .score-section {
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8ec 100%);
            border-radius: 8px;
            padding: 16px;
            margin: 16px 0;
            text-align: center;
        }
        .score-section label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            color: #333;
        }
        .score-display {
            font-size: 2.5rem;
            font-weight: bold;
            color: #667eea;
            margin: 10px 0;
        }
        .score-input {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .score-input input {
            width: 80px;
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
        }
        .score-input span {
            color: #666;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📚 文档审核助手</h1>
        
        <div class="card">
            <label>API Key（智谱AI）</label>
            <input type="password" id="apiKey" placeholder="请输入智谱AI API Key">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <p style="color: #888; font-size: 12px; margin-top: 8px;">
                    申请地址: https://open.bigmodel.cn/
                </p>
                <label style="display: flex; align-items: center; gap: 6px; font-size: 12px; color: #666; cursor: pointer;">
                    <input type="checkbox" id="rememberApiKey" checked>
                    记住API Key
                </label>
            </div>
        </div>
        
        <div class="card">
            <div class="tabs">
                <button class="tab active" onclick="switchTab('teaching')">📖 提交教学文档</button>
                <button class="tab" onclick="switchTab('review')">🔍 审核文档</button>
            </div>
            
            <div id="teaching-panel">
                <div class="step-info">
                    提交教学文档，AI会理解并消化其中的观点和理念
                </div>
                <div class="file-upload" onclick="document.getElementById('teachingFile').click()">
                    <input type="file" id="teachingFile" accept=".pdf,.docx,.doc,.txt,.md" onchange="handleFileSelect(this, 'teaching')">
                    <p>📁 点击上传教学文档</p>
                    <p style="color: #888; font-size: 12px;">支持 PDF、Word、文本、Markdown</p>
                </div>
                <textarea id="teachingContent" placeholder="或者直接粘贴文档内容..."></textarea>
                <button class="btn" onclick="submitTeachingDoc()" style="margin-top: 16px;">
                    理解文档
                </button>
                <div id="teaching-result" class="result hidden"></div>
            </div>
            
            <div id="review-panel" class="hidden">
                <div class="step-info">
                    提交审核文档，AI会运用已学习的教学文档知识进行评价
                </div>
                <div class="file-upload" onclick="document.getElementById('reviewFile').click()">
                    <input type="file" id="reviewFile" accept=".pdf,.docx,.doc,.txt,.md" onchange="handleFileSelect(this, 'review')">
                    <p>📁 点击上传审核文档</p>
                </div>
                <textarea id="reviewContent" placeholder="或者直接粘贴待审核的文档内容..."></textarea>
                <div class="score-section" id="aiScoreSection" style="display: none;">
                    <label>📊 AI评分</label>
                    <div class="score-display" id="scoreValue">-</div>
                </div>
                <button class="btn" onclick="submitReviewDoc()" style="margin-top: 16px;">
                    审核文档
                </button>
                <div id="review-result" class="result hidden"></div>
            </div>
        </div>
        
        <div class="card" style="background: #f0f0f0;">
            <h2>📤 分享给他人使用</h2>
            <p style="color: #666; font-size: 14px; line-height: 1.8;">
                <b>使用方法：</b><br>
                1. 把 <code style="background: #ddd; padding: 2px 6px; border-radius: 4px;">index.html</code> 文件发送给他人即可使用<br>
                2. 首次打开时需输入API Key（用自己的账号）<br>
                3. 勾选"记住API Key"后下次无需重复输入<br><br>
                <b>安全性：</b> API Key 只保存在用户浏览器本地，不上传到任何服务器
            </p>
        </div>
    </div>

    <script>
        // =====================================================================
        // 使用方法 (二选一):
        // 
        // 方法1: 自己用 (简单)
        //   直接双击打开 index.html，首次输入API Key即可
        //   注意: 可能会提示CORS错误，需要看方法2
        //
        // 方法2: 给别人用 (推荐)
        //   1. 部署 Cloudflare Worker (不会弄? 请找人帮忙)
        //   2. 部署后把地址填到下面 API_BASE
        // =====================================================================
        
        const API_BASE = '';   // 部署Worker后填入地址，如: https://xxx.workers.dev
        let teachingSummary = '';
        
        // 页面加载时读取保存的API Key
        window.onload = function() {
            const savedKey = localStorage.getItem('docReviewerApiKey');
            if (savedKey) {
                document.getElementById('apiKey').value = savedKey;
            }
            
            // 保存API Key复选框状态
            const rememberCheck = document.getElementById('rememberApiKey');
            const savedRemember = localStorage.getItem('docReviewerRemember');
            if (savedRemember !== null) {
                rememberCheck.checked = savedRemember === 'true';
            }
        };
        
        function saveApiKey() {
            const remember = document.getElementById('rememberApiKey').checked;
            localStorage.setItem('docReviewerRemember', remember);
            if (remember) {
                localStorage.setItem('docReviewerApiKey', document.getElementById('apiKey').value);
            } else {
                localStorage.removeItem('docReviewerApiKey');
            }
        }
        
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab')[tab === 'teaching' ? 0 : 1].classList.add('active');
            
            document.getElementById('teaching-panel').classList.toggle('hidden', tab !== 'teaching');
            document.getElementById('review-panel').classList.toggle('hidden', tab !== 'review');
        }
        
        async function handleFileSelect(input, type) {
            const file = input.files[0];
            if (!file) return;
            
            const apiKey = document.getElementById('apiKey').value;
            if (!apiKey) {
                alert('请先输入API Key');
                input.value = '';
                return;
            }
            
            const btn = input.closest('.file-upload').querySelector('p');
            const fileNameEl = btn.nextElementSibling;
            
            const fileExt = file.name.split('.').pop().toLowerCase();
            
            if (fileExt === 'txt' || fileExt === 'md') {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById(type + 'Content').value = e.target.result;
                    btn.textContent = `✅ 已加载: ${file.name}`;
                };
                reader.readAsText(file);
            } else if (fileExt === 'docx') {
                btn.textContent = '正在解析Word文档...';
                try {
                    const result = await parseDocx(file);
                    document.getElementById(type + 'Content').value = result;
                    btn.textContent = `✅ 已加载: ${file.name}`;
                } catch(e) {
                    btn.textContent = '📁 点击上传教学文档';
                    alert('Word文档解析失败: ' + e.message + '\n请复制粘贴文档内容到下方文本框');
                }
            } else {
                alert('支持格式: TXT、MD、Word(.docx)\nPDF和其他格式请复制粘贴内容到下方文本框');
            }
        }
        
        async function parseDocx(file) {
            try {
                const arrayBuffer = await file.arrayBuffer();
                const zip = await JSZip.loadAsync(arrayBuffer);
                
                const documentXml = await zip.file("word/document.xml")?.async("string");
                if (!documentXml) {
                    throw new Error('无效的Word文档');
                }
                
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(documentXml, "text/xml");
                const paragraphs = xmlDoc.getElementsByTagName("w:p");
                
                const textParts = [];
                for (let p of paragraphs) {
                    const texts = p.getElementsByTagName("w:t");
                    let text = "";
                    for (let t of texts) {
                        text += t.textContent || "";
                    }
                    if (text.trim()) textParts.push(text);
                }
                
                return textParts.join("\n");
            } catch (e) {
                throw new Error('解析失败: ' + e.message);
            }
        }
        
        async function submitTeachingDoc() {
            saveApiKey();
            const apiKey = document.getElementById('apiKey').value;
            const content = document.getElementById('teachingContent').value;
            const resultDiv = document.getElementById('teaching-result');
            
            if (!apiKey) { alert('请输入API Key'); return; }
            if (!content.trim()) { alert('请输入文档内容'); return; }
            
            resultDiv.classList.remove('hidden');
            resultDiv.innerHTML = '<div class="loading">AI正在理解文档</div>';
            
            try {
                const isProxy = !!API_BASE;
                const requestBody = isProxy ? {
                    api_key: apiKey,
                    action: 'understand',
                    content: content
                } : {
                    model: 'glm-4-flash',
                    messages: [
                        { role: 'system', content: '你是一个教学文档分析助手。请仔细阅读用户提供的教学文档，理解其中的教育理念、教学方法和核心观点。然后用简洁的语言总结出该文档的核心要点，以便后续用于审核其他文档的参考。' },
                        { role: 'user', content: '请理解以下教学文档并总结核心要点：\n\n' + content }
                    ]
                };
                
                const fetchOptions = {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(requestBody)
                };
                
                if (!isProxy) {
                    fetchOptions.headers['Authorization'] = 'Bearer ' + apiKey;
                }
                
                const response = await fetch(API_BASE || 'https://open.bigmodel.cn/api/paas/v4/chat/completions', fetchOptions);
                
                const result = await response.json();
                
                if (result.choices && result.choices[0]) {
                    teachingSummary = result.choices[0].message.content;
                    resultDiv.textContent = teachingSummary;
                } else {
                    resultDiv.textContent = '错误: ' + (result.error?.message || JSON.stringify(result));
                }
            } catch (e) {
                resultDiv.textContent = '请求失败: ' + e.message;
            }
        }
        
        async function submitReviewDoc() {
            saveApiKey();
            const apiKey = document.getElementById('apiKey').value;
            const content = document.getElementById('reviewContent').value;
            const resultDiv = document.getElementById('review-result');
            const scoreSection = document.getElementById('aiScoreSection');
            
            if (!apiKey) { alert('请输入API Key'); return; }
            if (!content.trim()) { alert('请输入文档内容'); return; }
            if (!teachingSummary) {
                alert('请先提交教学文档');
                switchTab('teaching');
                return;
            }
            
            resultDiv.classList.remove('hidden');
            resultDiv.innerHTML = '<div class="loading">AI正在进行审核</div>';
            scoreSection.style.display = 'block';
            document.getElementById('scoreValue').textContent = '评分中...';
            
            try {
                const isProxy = !!API_BASE;
                const requestBody = isProxy ? {
                    api_key: apiKey,
                    action: 'review',
                    content: content,
                    teaching_summary: teachingSummary
                } : {
                    model: 'glm-4-flash',
                    messages: [
                        { role: 'system', content: '你是一个教学文档审核专家。请根据已学习的教学文档（参考标准），审核待审核的文档。\n\n已学习的教学文档核心要点：\n' + teachingSummary + '\n\n请对待审核的文档进行详细评价，包括：\n1. 与参考标准的符合程度\n2. 优点和亮点\n3. 需要改进的地方\n4. 总体评价\n\n重要：请在审核意见的最后，用"最终评分：X分"格式给出你的评分（1-10分）。' },
                        { role: 'user', content: '请审核以下文档：\n\n' + content }
                    ]
                };
                
                const fetchOptions = {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(requestBody)
                };
                
                if (!isProxy) {
                    fetchOptions.headers['Authorization'] = 'Bearer ' + apiKey;
                }
                
                const response = await fetch(API_BASE || 'https://open.bigmodel.cn/api/paas/v4/chat/completions', fetchOptions);
                
                const result = await response.json();
                
                if (result.choices && result.choices[0]) {
                    const reviewText = result.choices[0].message.content;
                    resultDiv.textContent = reviewText;
                    
                    // 提取AI评分
                    const scoreMatch = reviewText.match(/评分[：:]\s*(\d+)/);
                    if (scoreMatch) {
                        const aiScore = parseInt(scoreMatch[1]);
                        document.getElementById('scoreValue').textContent = aiScore + '/10分';
                    } else {
                        document.getElementById('scoreValue').textContent = '未评定';
                    }
                } else {
                    resultDiv.textContent = '错误: ' + (result.error?.message || JSON.stringify(result));
                    document.getElementById('scoreValue').textContent = '错误';
                }
            } catch (e) {
                resultDiv.textContent = '请求失败: ' + e.message;
                document.getElementById('scoreValue').textContent = '失败';
            }
        }
    </script>
</body>
</html>
